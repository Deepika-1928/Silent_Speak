{% extends 'LingoVoice/base.html' %}
{% block body_layout %}
<input type="hidden" id="django-csrf-token" value="{{ csrf_token }}">
<style>
    /* Custom Luxury Smooth Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #07060a; }
    ::-webkit-scrollbar-thumb { background: #2d263b; border-radius: 10px; }
    /* True 3D Physical Layer Stacked Depth */
    .bento-3d-panel {
        background: linear-gradient(135deg, rgba(30, 25, 41, 0.7) 0%, rgba(15, 12, 22, 0.85) 100%);
        border-top: 1px solid rgba(224, 168, 153, 0.25);
        border-left: 1px solid rgba(224, 168, 153, 0.15);
        border-right: 1px solid rgba(0, 0, 0, 0.4);
        border-bottom: 1px solid rgba(0, 0, 0, 0.5);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 2px rgba(255, 255, 255, 0.08), inset 0 -3px 10px rgba(0, 0, 0, 0.4);
        transform: perspective(1000px) rotateX(1deg);
        backdrop-filter: blur(16px);
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .bento-3d-panel:hover { transform: perspective(1000px) rotateX(0deg) translateY(-2px); border-top-color: rgba(224, 168, 153, 0.4); box-shadow: 0 30px 60px -10px rgba(147, 51, 234, 0.15), 0 0 20px rgba(147, 51, 234, 0.05), inset 0 1px 2px rgba(255, 255, 255, 0.1); }
    /* Tactile Sound Engine Micro-Bevel Buttons */
    .tactile-luxury-btn { background: linear-gradient(145deg, #231c30 0%, #110c1a 100%); border-top: 1px solid rgba(255, 255, 255, 0.05); border-left: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 2px solid rgba(0, 0, 0, 0.6); border-right: 2px solid rgba(0, 0, 0, 0.5); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .tactile-luxury-btn:hover { transform: translateZ(10px) translateY(-4px); border-top-color: rgba(224, 168, 153, 0.4); border-left-color: rgba(224, 168, 153, 0.2); box-shadow: 0 15px 25px rgba(147, 51, 234, 0.25), 0 0 15px rgba(224, 168, 153, 0.1); }
    .tactile-luxury-btn:active { transform: translateY(2px); border-bottom-color: rgba(255,255,255,0.05); box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(0,0,0,0.4); }
    .glass-modal { background: rgba(13, 10, 18, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .modal-input { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(224, 168, 153, 0.3); color: #e2e8f0; padding: 6px 12px; border-radius: 8px; font-size: 12px; width: 60%; text-align: right; transition: all 0.2s ease; }
    .modal-input:focus { outline: none; border-color: #9333ea; box-shadow: 0 0 10px rgba(147, 51, 234, 0.3); }
</style>

<div class="min-h-screen w-full flex flex-col md:flex-row bg-[#060508] p-5 gap-6 text-slate-200 font-sans antialiased relative overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-full md:w-76 flex flex-col justify-between p-6 rounded-[32px] shrink-0 bg-[#0d0a12] border border-purple-950/40 shadow-[10px_0_40px_rgba(0,0,0,0.6)] relative z-20">
        <div class="space-y-8">
            <div onclick="openProfileInspector()" class="p-4 rounded-2xl bg-gradient-to-b from-[#181321] to-[#0f0c14] border border-white/5 shadow-[inset_0_2px_4px_rgba(255,255,255,0.03)] flex flex-col items-center text-center relative overflow-hidden group cursor-pointer transition-all duration-300 hover:border-purple-500/30 hover:shadow-[0_0_25px_rgba(147,51,234,0.15)]">
                <div class="w-16 h-16 rounded-full p-0.5 bg-gradient-to-tr from-[#e0a899] to-[#9333ea] shadow-[0_4px_15px_rgba(147,51,234,0.4)] mb-3 relative z-10">
                    <div class="w-full h-full bg-[#0d0a12] rounded-full flex items-center justify-center text-xl shadow-inner">👤</div>
                </div>
                <h3 class="text-xs font-black tracking-wide text-white">{{ user.username|default:"deepika" }}</h3>
                <p class="text-[9px] text-[#e0a899] font-black tracking-widest uppercase mt-0.5 bg-purple-950/40 px-2.5 py-0.5 rounded-full">PREMIUM MEMBER</p>
            </div>
            <nav class="space-y-3">
                <button onclick="switchView('dashboard-view')" id="nav-dashboard-view" class="w-full flex items-center gap-4 px-5 py-3.5 text-white rounded-2xl transition-all shadow-xl target-nav" style="background: linear-gradient(135deg, #e0a899 0%, #9333ea 100%);">🏠 <span class="font-bold text-[11px] tracking-wider uppercase">Dashboard</span></button>
                <button onclick="switchView('stt-view')" id="nav-stt-view" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-400 hover:text-white rounded-2xl transition-all hover:bg-white/5 target-nav">🎙 ️ <span class="font-bold text-[11px] tracking-wider uppercase">Speech to Text</span></button>
                <button onclick="switchView('tts-view')" id="nav-tts-view" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-400 hover:text-white rounded-2xl transition-all hover:bg-white/5 target-nav">🔊 <span class="font-bold text-[11px] tracking-wider uppercase">Text to Speech</span></button>
                <button onclick="openFeedbackModal()" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-400 hover:text-white rounded-2xl transition-all hover:bg-white/5 target-nav">📝 <span class="font-bold text-[11px] tracking-wider uppercase">Feedback</span></button>
            </nav>
        </div>
        <a href="{% url 'logout' %}" class="flex items-center gap-4 px-5 py-3.5 text-rose-400/70 hover:text-rose-400 font-black text-[11px] tracking-wider uppercase rounded-xl transition-all">🚪  Exit System</a>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col gap-6 relative z-10">
        <header class="bento-3d-panel px-8 py-5 rounded-2xl flex justify-between items-center">
            <h1 class="text-lg font-black text-white tracking-tight" id="view-title">Workspace Dashboard</h1>
            <div class="flex items-center gap-3 text-[10px] font-black text-slate-400 bg-black/40 px-4 py-2 rounded-full border border-white/5 tracking-wider"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> SYSTEM ONLINE</div>
        </header>

        <div class="flex-grow overflow-y-auto space-y-6 pr-1">
            <div id="dashboard-view" class="app-view space-y-6">
                <!-- Dashboard content remains as per your original -->
                <div class="p-8 rounded-3xl text-white shadow-2xl border border-white/10" style="background: linear-gradient(135deg, #160f21 0%, #09050d 100%);">
                    <h2 class="text-xl font-black mt-3 mb-1">Intelligent Vocal Soundboard</h2>
                </div>
            </div>

            <!-- Speech to Text View -->
            <div id="stt-view" class="app-view hidden space-y-6">
                 <!-- STT remains as per your original -->
            </div>

            <!-- Text to Speech View -->
            <div id="tts-view" class="app-view hidden space-y-6">
                <div class="bento-3d-panel p-8 rounded-3xl space-y-6">
                    <textarea id="tts-buffer" rows="4" class="w-full bg-[#110e17] border border-white/5 rounded-2xl p-6 text-sm focus:outline-none focus:border-purple-500/50 shadow-inner resize-none text-white" placeholder="Type text buffer segment here..."></textarea>
                    <select id="tts-lang" class="w-full bg-[#131018] border border-white/5 rounded-xl p-4 font-bold text-xs text-slate-300 shadow-inner">
                        <option value="en-IN">English Accent (India)</option>
                        <option value="hi-IN">Hindi Mode ( हिंदी )</option>
                    </select>
                    <button onclick="handleTTSEngine()" class="w-full py-4 text-white font-black text-[11px] uppercase rounded-xl" style="background: linear-gradient(135deg, #e0a899 0%, #9333ea 100%);">📢  Execute Voice</button>
                </div>
                <div id="tts-history" class="space-y-2"></div>
            </div>
        </div>
    </main>
</div>

<script>
    // --- STREAMING INTERFACE ENGINE ---
    function handleTTSEngine() {
        const inputVal = document.getElementById('tts-buffer').value.trim();
        const selectedLang = document.getElementById('tts-lang').value;
        if (!inputVal) return alert("Please populate text buffer first.");
        
        const csrf = document.getElementById('django-csrf-token').value;
        
        fetch('/text-to-speech/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
            body: JSON.stringify({ text: inputVal, lang: selectedLang })
        })
        .then(res => {
            if (!res.ok) throw new Error("Synthesis failed.");
            return res.blob();
        })
        .then(blob => {
            const audio = new Audio(URL.createObjectURL(blob));
            audio.play().catch(e => console.error("Playback error:", e));
        })
        .catch(err => alert("Error: " + err));
    }

    function switchView(viewId) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
        document.getElementById('view-title').innerText = viewId.replace('-view', '').replace('-', ' ').toUpperCase();
    }
    
    // ... (Keep your other existing helper functions: submitFeedback, openProfileInspector, etc.)
</script>
{% endblock %}
